name: Build Node.js for armv7l
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU for ARM emulation
        uses: docker/setup-qemu-action@v3

      - name: Build Node.js in arm32v7 container
        run: |
          docker run --rm -v /tmp/out:/opt/out arm32v7/ubuntu:22.04 bash -c "
            apt update && DEBIAN_FRONTEND=noninteractive apt install -y \
              curl xz-utils make gcc g++ python3

            curl -sL https://nodejs.org/dist/v24.18.0/node-v24.18.0.tar.xz \
              -o /tmp/node.tar.xz
            tar -xJf /tmp/node.tar.xz -C /tmp
            cd /tmp/node-v24.18.0

            ./configure --without-intl --without-snapshot
            make -j4

            mkdir -p /opt/out
            cp /tmp/node-v24.18.0/out/Release/node /opt/out/
            cd /opt/out && tar -czf /tmp/node-v24-armv7l.tar.gz node
            cp /tmp/node-v24-armv7l.tar.gz /opt/out/
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-v24-armv7l
          path: /tmp/out/node-v24-armv7l.tar.gz
